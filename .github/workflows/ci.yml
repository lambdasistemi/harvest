name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # Derivations whose tests run during the build phase
      # (cargo test, npm test, aiken check, haskell library build).
      - name: Build derivation-backed checks
        run: >-
          nix build --quiet --no-link
          .#checks.x86_64-linux.library
          .#checks.x86_64-linux.groth16-ffi
          .#checks.x86_64-linux.circuit
          .#checks.x86_64-linux.circuit-tests
          .#checks.x86_64-linux.aiken-check

      # Shell-app checks must be *executed*, not just built, so the
      # underlying test binary actually runs. Every new E2E test is
      # driven through this step so regressions fail CI.
      #
      # We invoke via the explicit 'apps' attribute (defined in
      # nix/apps.nix) so 'nix run' always picks the writeShellApplication
      # wrapper (which sets HARVEST_FIXTURES_DIR, cardano-node PATH, and
      # the groth16-ffi LD_LIBRARY_PATH) — never the raw test binary
      # from the haskell.nix component, which would be missing those.
      - name: Run unit-tests (hspec) via nix run
        run: nix run --quiet .#apps.x86_64-linux.unit-tests

      # Lint (fourmolu + hlint) is also a shell-app check that must be
      # executed.
      - name: Run lint via nix run
        run: nix run --quiet .#apps.x86_64-linux.lint

