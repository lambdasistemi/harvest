name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build all derivations
        run: >-
          nix build --quiet --no-link
          .#checks.x86_64-linux.library
          .#checks.x86_64-linux.unit-tests
          .#checks.x86_64-linux.groth16-ffi
          .#checks.x86_64-linux.circuit
          .#checks.x86_64-linux.lint
          .#checks.x86_64-linux.aiken-check

  lint:
    name: Lint
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Fourmolu + HLint
        run: nix run .#lint --quiet
